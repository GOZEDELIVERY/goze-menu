<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOZE Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        let cart = {};
        const deliveryFee = 8.00;

        function navigateTo(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function updateQuantity(id, name, price, change) {
            if (!cart[id]) cart[id] = { name, price, qty: 0 };
            cart[id].qty = Math.max(0, cart[id].qty + change);
            document.getElementById(`qty-${id}`).innerText = cart[id].qty;
            updateCartUI();
        }

        function updateCartUI() {
            let subtotal = 0;
            let items = "";
            for (let id in cart) {
                if (cart[id].qty > 0) {
                    subtotal += cart[id].price * cart[id].qty;
                    items += `<li>${cart[id].name} x${cart[id].qty} - $${(cart[id].price * cart[id].qty).toFixed(2)}</li>`;
                }
            }
            document.getElementById('cart-list').innerHTML = items || "<li>El carrito está vacío</li>";
            document.getElementById('subtotal').innerText = subtotal.toFixed(2);
            document.getElementById('total').innerText = (subtotal + deliveryFee).toFixed(2);
        }

        function confirmOrder() {
            const calle = document.getElementById('calle').value;
            const num = document.getElementById('numero').value;
            const col = document.getElementById('colonia').value;
            const pago = document.getElementById('metodoPago').value;

            if (!calle || !num || !col) {
                alert("Por favor, llena los datos de entrega.");
                return;
            }

            let message = "¡Hola! Quiero hacer un pedido en GOZE Delivery:\n\n";
            let subtotal = 0;
            for (let id in cart) {
                if (cart[id].qty > 0) {
                    message += `- ${cart[id].name} x${cart[id].qty}\n`;
                    subtotal += cart[id].price * cart[id].qty;
                }
            }
            message += `\nEnvío: $8.00\nTOTAL: $${(subtotal + deliveryFee).toFixed(2)}`;
            message += `\n\n--- Entrega ---\nCalle: ${calle}\nNum: ${num}\nCol: ${col}\nPago: ${pago}`;

            window.open(`https://wa.me/523333580863?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</head>
<body class="bg-gray-100 pb-20">

    <!-- Header -->
    <header class="bg-black text-white p-6 text-center shadow-lg">
        <h1 class="text-3xl font-bold uppercase">GOZE Delivery</h1>
    </header>

    <!-- Views -->
    <main class="max-w-2xl mx-auto p-4">

        <!-- Vista Principal -->
        <div id="view-home" class="view space-y-4">
            <button onclick="navigateTo('view-cervezas')" class="w-full bg-white p-6 rounded-2xl shadow font-bold text-lg">🍺 Cervezas</button>
            <button onclick="alert('Próximamente...')" class="w-full bg-white p-6 rounded-2xl shadow font-bold text-lg">🍷 Vinos y Licores</button>
        </div>

        <!-- Vista Cervezas -->
        <div id="view-cervezas" class="view hidden space-y-4">
            <button onclick="navigateTo('view-home')" class="text-blue-600 mb-4 font-bold">← Atrás</button>
            <button onclick="navigateTo('view-modelo')" class="w-full bg-white p-6 rounded-2xl shadow font-bold text-lg">🏢 Grupo Modelo</button>
            <button onclick="alert('Próximamente...')" class="w-full bg-white p-6 rounded-2xl shadow font-bold text-lg"> Heineken</button>
        </div>

        <!-- Vista Modelo -->
        <div id="view-modelo" class="view hidden space-y-4">
            <button onclick="navigateTo('view-cervezas')" class="text-blue-600 mb-4 font-bold">← Atrás</button>
            <button onclick="navigateTo('view-medias')" class="w-full bg-white p-4 rounded-xl shadow">Medias 355ml</button>
            <button onclick="alert('Próximamente')" class="w-full bg-white p-4 rounded-xl shadow">Ampolletas 210ml</button>
        </div>

        <!-- Vista Medias (Ejemplo de productos) -->
        <div id="view-medias" class="view hidden space-y-4">
            <button onclick="navigateTo('view-modelo')" class="text-blue-600 mb-4 font-bold">← Atrás</button>
            <div class="flex justify-between items-center p-3 bg-white rounded-lg shadow">
                <span>Corona Extra</span>
                <div class="flex items-center gap-3">
                    <button onclick="updateQuantity('corona', 'Corona', 18, -1)" class="bg-gray-200 px-3 rounded">-</button>
                    <span id="qty-corona">0</span>
                    <button onclick="updateQuantity('corona', 'Corona', 18, 1)" class="bg-yellow-500 text-white px-3 rounded">+</button>
                </div>
            </div>
        </div>

        <!-- Formulario Checkout -->
        <div id="view-checkout" class="view bg-white p-6 rounded-2xl mt-8 shadow-lg">
            <h3 class="font-bold mb-4">🛒 Tu Pedido</h3>
            <ul id="cart-list" class="text-sm mb-4"><li>Carrito vacío</li></ul>
            <p class="font-bold">Total: $<span id="total">0.00</span></p>
            <div class="space-y-3 mt-4">
                <input type="text" id="calle" placeholder="Calle" class="w-full p-2 border rounded">
                <input type="text" id="numero" placeholder="Número" class="w-full p-2 border rounded">
                <input type="text" id="colonia" placeholder="Colonia" class="w-full p-2 border rounded">
                <select id="metodoPago" class="w-full p-2 border rounded">
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                </select>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">Enviar WhatsApp</button>
            </div>
        </div>
    </main>

</body>
</html>
